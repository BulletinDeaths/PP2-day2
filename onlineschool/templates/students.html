{% extends 'base.html' %}
{% block content %}
<h2>Студенты</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Email</th>
        <th>Отчет</th>
        <th>Удалить</th> <!-- НОВАЯ КОЛОНКА -->
  </tr>
  {% for student in students %}
  <tr>
      <td>{{ student.id }}</td>
      <td>{{ student.name }}</td>
      <td>{{ student.email }}</td>
      <td><a href="{{ url_for('student_report', student_id=student.id) }}" class="btn btn-primary btn-sm">Отчет</a></td>
      <td>
          <!-- ФОРМА ДЛЯ УДАЛЕНИЯ -->
          <form action="{{ url_for('delete_student', student_id=student.id) }}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Вы уверены, что хотите удалить этого студента?')">Удалить</button>
          </form>
      </td>
  </tr>
  {% endfor %}
</table>
<hr>
<h3>Добавить нового студента</h3>
<form action="{{ url_for('add_student') }}" method="post">
    <label for="name">Имя:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <button type="submit" class="btn btn-success">Добавить студента</button>
</form>
{% endblock %}
